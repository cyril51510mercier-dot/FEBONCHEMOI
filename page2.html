<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fébonchémoi - Diagnostic & Coach</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>📊 Diagnostic & Actions</h1>

    <div class="summary-card">
        <div class="stat-box">
            <div class="stat-value" id="disp-pmv">--</div>
            <div class="stat-label">Votre PMV</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="disp-top">--</div>
            <div class="stat-label">T° Opérative</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="disp-rh">--</div>
            <div class="stat-label">Humidité Int.</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="disp-clo">--</div>
            <div class="stat-label">Isol. Vêtements (Clo)</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="disp-insul">--</div>
            <div class="stat-label">Isol. Maison</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="disp-room">--</div>
            <div class="stat-label">Pièce</div>
        </div>
    </div>

    <h2 style="margin-top: 30px;">💡 Les recommandations du Coach</h2>
    <div id="recommendations-container">
        </div>

    <div class="section" style="margin-top: 30px; border-top: 4px solid #34495e;">
        <h3 style="color: #2c3e50; margin-top: 0;">📅 Historique de cette zone</h3>
        
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 0.9em; text-align: left;">
                <thead>
                    <tr style="background-color: #ecf0f1; border-bottom: 2px solid #bdc3c7;">
                        <th style="padding: 10px;">Date</th>
                        <th style="padding: 10px;">T° Air</th>
                        <th style="padding: 10px;">T° Ext</th>
                        <th style="padding: 10px;">PMV</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    </tbody>
            </table>
        </div>

        <button id="saveHistoryBtn" style="width: 100%; background-color: #3498db; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer;">
            💾 Enregistrer le bilan d'aujourd'hui
        </button>
    </div>

    <center style="margin-top: 30px; margin-bottom: 30px;">
        <a href="index.html" class="btn-back" style="color: #7f8c8d; text-decoration: none; font-weight: bold;">← Retour aux mesures</a>
    </center>

    <script src="page2_script.js"></script>
</body>
</html>
